# ========================================================
# 小挑 (Xiaotiao) — Nginx 站点配置
# ========================================================
# 使用方法:
#   1. 复制到 /etc/nginx/sites-available/xiaotiao.conf
#   2. ln -s /etc/nginx/sites-available/xiaotiao.conf /etc/nginx/sites-enabled/
#   3. 删除默认配置: rm /etc/nginx/sites-enabled/default
#   4. 修改 YOUR_DOMAIN_OR_IP 为实际域名或公网 IP
#   5. 修改 /home/deploy/xiaotiao-main 为实际项目路径
#   6. nginx -t && systemctl reload nginx
# ========================================================

# --- Rate Limiting Zones (B-2: 防止 API 滥用) ---
# 通用 API 限速：每 IP 每秒 10 请求，突发排队 20 个
limit_req_zone $binary_remote_addr zone=api_general:10m rate=10r/s;
# LLM 重型端点限速：每 IP 每秒 2 请求
limit_req_zone $binary_remote_addr zone=api_llm:10m rate=2r/s;

# --- HTTP 配置 ---
server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    # 前端静态文件
    root /home/deploy/xiaotiao-main/xiaotiao-app/dist;
    index index.html;

    # 客户端上传大小限制 (论文 PDF)
    client_max_body_size 50M;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;

    # ---- 后端 API 反向代理 ----
    # LLM 重型端点 (生成/解读/翻译) — 严格限速
    location ~ ^/(topic|article|translation)/ {
        limit_req zone=api_llm burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # LLM 请求可能耗时较长
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # 其他后端 API — 通用限速
    location ~ ^/(auth|vocab|research|papers|topics|collections|multimodal|feedback|health|docs|openapi\.json|redoc|admin) {
        limit_req zone=api_general burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # ---- 前端 SPA 回退 ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

