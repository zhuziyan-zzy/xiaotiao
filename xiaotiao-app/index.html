<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>再译 — 华东政法大学涉外法治多模态学习平台</title>
  <meta name="description" content="再译 — 华东政法大学涉外法治多模态学习平台，提供主题探索、文章解读、翻译训练等核心模块。" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
</head>
<body>
  <!-- Atmospheric Background -->
  <div class="bg-atmosphere">
    <div class="orb orb--green"></div>
    <div class="orb orb--orange"></div>
    <div class="orb orb--pink"></div>
  </div>
  <div class="bg-noise"></div>

  <!-- Liquid Glass Navbar -->
  <nav class="navbar" id="navbar">
    <div class="navbar__inner">
      <div class="navbar__brand" onclick="location.hash='/home'">
        <div class="navbar__logo">译</div>
        <div class="navbar__title"><span>再译</span></div>
      </div>
      <!-- Desktop Segmented Nav -->
      <div class="navbar__nav segmented" id="navbar-segmented">
        <div class="segmented__slider" id="navbar-slider"></div>
        <a href="#/home" class="nav-link segmented__btn" data-route="/home">
          首页
        </a>
        <a href="#/papers" class="nav-link segmented__btn" data-route="/papers">
          <span class="nav-dot" style="background:var(--research)"></span>论文库
        </a>
        <a href="#/topic" class="nav-link segmented__btn" data-route="/topic">
          <span class="nav-dot" style="background:var(--topic)"></span>主题探索
        </a>
        <a href="#/article" class="nav-link segmented__btn" data-route="/article">
          <span class="nav-dot" style="background:var(--article)"></span>文章实验室
        </a>
        <a href="#/translation" class="nav-link segmented__btn" data-route="/translation">
          <span class="nav-dot" style="background:var(--translation)"></span>翻译工作室
        </a>
        <a href="#/tracker" class="nav-link segmented__btn" data-route="/tracker">
          <span class="nav-dot" style="background:#f472b6"></span>追踪
        </a>
        <a href="#/vocab" class="nav-link segmented__btn" data-route="/vocab">
          <span class="nav-dot" style="background:#fbbf24"></span>生词本
        </a>
        <a href="#/progress" class="nav-link segmented__btn" data-route="/progress">
          <span class="nav-dot" style="background:#4ade80"></span>学习进度
        </a>
      </div>
      <div class="navbar__actions">
        <button class="btn btn--ghost btn--sm" id="btn-logout">退出登录</button>
      </div>

    </div>
  </nav>

  <!-- Page Content Container -->
  <main class="page" id="app"></main>

  <!-- Theme Config Floating Button -->
  <button class="theme-config-fab" id="theme-config-fab" title="主题设置">
    主题
  </button>

  <!-- Theme Config Modal -->
  <div class="theme-config-overlay" id="theme-config-overlay" aria-hidden="true">
    <div class="theme-config-dialog" role="dialog" aria-modal="true" aria-labelledby="theme-config-title">
      <div class="theme-config-header">
        <div>
          <div class="theme-config-title" id="theme-config-title">主题设置</div>
          <div class="theme-config-subtitle">选择界面风格</div>
        </div>
        <button class="theme-config-close" data-theme-close>关闭</button>
      </div>
      <div class="theme-switcher-container">
        <button class="theme-btn theme-btn--abyss" data-theme="abyss" aria-label="Abyss"></button>
        <button class="theme-btn theme-btn--emerald" data-theme="emerald" aria-label="Emerald"></button>
        <button class="theme-btn theme-btn--cyber" data-theme="cyber" aria-label="Cyber"></button>
        <button class="theme-btn theme-btn--obsidian" data-theme="obsidian" aria-label="Obsidian"></button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p class="footer__text">
        再译 © 2026 · 华东政法大学涉外法治多模态学习平台 · 
        <a href="#">V1 MVP</a>
      </p>
    </div>
  </footer>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
