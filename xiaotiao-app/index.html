<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>再译 — 华东政法大学涉外法治多模态学习平台</title>
  <meta name="description" content="再译 — 华东政法大学涉外法治多模态学习平台，提供主题探索、文章解读、翻译训练等核心模块。" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
</head>
<body>
  <!-- Atmospheric Background -->
  <div class="bg-atmosphere">
    <div class="orb orb--green"></div>
    <div class="orb orb--orange"></div>
    <div class="orb orb--pink"></div>
  </div>
  <div class="bg-noise"></div>
  <div class="bg-pattern"></div>

  <!-- Liquid Glass Navbar — V2.0 Simplified -->
  <nav class="navbar" id="navbar">
    <div class="navbar__inner">
      <div class="navbar__brand" onclick="location.hash='/home'">
        <div class="navbar__logo">译</div>
        <div class="navbar__title"><span>再译</span></div>
      </div>
      <!-- V2.0: 3 core navigation items -->
      <div class="navbar__nav segmented" id="navbar-segmented">
        <div class="segmented__slider" id="navbar-slider"></div>
        <a href="#/home" class="nav-link segmented__btn" data-route="/home">
          <span class="nav-dot" style="background:var(--topic)"></span>首页
        </a>
        <a href="#/research" class="nav-link segmented__btn" data-route="/research">
          <span class="nav-dot" style="background:var(--research)"></span>文献研究
        </a>
        <a href="#/explore" class="nav-link segmented__btn" data-route="/explore">
          <span class="nav-dot" style="background:var(--article)"></span>主题探索
        </a>
        <a href="#/vocab" class="nav-link segmented__btn" data-route="/vocab">
          <span class="nav-dot" style="background:var(--translate)"></span>生词本
        </a>
      </div>
      <!-- V2.0: Right actions — sidebar toggle + user menu -->
      <div class="navbar__actions">
        <a href="#/settings/profile" class="navbar__profile-badge" id="navbar-profile-badge" title="当前画像设置（点击修改）" style="display:none;text-decoration:none;margin-right:6px;padding:4px 10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);border-radius:20px;font-size:0.7rem;color:var(--text-secondary);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;transition:background 150ms;">
          <span id="navbar-profile-text">画像未设置</span>
        </a>
        <button class="btn btn--icon navbar__sidebar-toggle" id="btn-sidebar-toggle" title="工具面板">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
        </button>
        <div class="navbar__user-menu" id="user-menu">
          <button class="navbar__avatar" id="btn-user-avatar" aria-label="用户菜单">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a7 7 0 0 1 14 0v1"/></svg>
          </button>
          <div class="navbar__dropdown" id="user-dropdown">
            <div class="navbar__dropdown-user" id="dropdown-username">用户</div>
            <div class="navbar__dropdown-divider"></div>
            <a class="navbar__dropdown-item" href="#/settings/profile">
              <span>⚙️</span> 画像设置
            </a>
            <button class="navbar__dropdown-item navbar__dropdown-item--danger" id="btn-logout">
              <span>🚪</span> 退出登录
            </button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- V2.0: Sidebar Panel (collapsible) -->
  <aside class="sidebar-panel" id="sidebar-panel" aria-hidden="true">
    <div class="sidebar-panel__header">
      <div class="sidebar-panel__tabs">
        <button class="sidebar-tab active" data-tab="vocab">📖 生词本</button>
        <button class="sidebar-tab" data-tab="translate">🔤 翻译</button>
      </div>
      <button class="sidebar-panel__close" id="btn-sidebar-close" aria-label="关闭侧栏">✕</button>
    </div>
    <div class="sidebar-panel__content" id="sidebar-content">
      <div class="sidebar-empty">
        <div class="sidebar-empty__icon">📖</div>
        <div class="sidebar-empty__text">在阅读文章时，<br>划词添加生词或翻译</div>
      </div>
    </div>
  </aside>

  <!-- Page Content Container -->
  <main class="page" id="app"></main>

  <!-- Theme Config Floating Button -->
  <button class="theme-config-fab" id="theme-config-fab" title="主题设置">
    主题
  </button>

  <!-- Theme Config Modal -->
  <div class="theme-config-overlay" id="theme-config-overlay" aria-hidden="true">
    <div class="theme-config-dialog" role="dialog" aria-modal="true" aria-labelledby="theme-config-title">
      <div class="theme-config-header">
        <div>
          <div class="theme-config-title" id="theme-config-title">主题设置</div>
          <div class="theme-config-subtitle">选择界面风格</div>
        </div>
        <button class="theme-config-close" data-theme-close>关闭</button>
      </div>
      <div class="theme-switcher-container">
        <button class="theme-btn theme-btn--abyss" data-theme="abyss" aria-label="Abyss"></button>
        <button class="theme-btn theme-btn--emerald" data-theme="emerald" aria-label="Emerald"></button>
        <button class="theme-btn theme-btn--cyber" data-theme="cyber" aria-label="Cyber"></button>
        <button class="theme-btn theme-btn--obsidian" data-theme="obsidian" aria-label="Obsidian"></button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p class="footer__text">
        再译 © 2026 · 华东政法大学涉外法治多模态学习平台 · 
        <a href="#">V2.0</a>
      </p>
    </div>
  </footer>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
