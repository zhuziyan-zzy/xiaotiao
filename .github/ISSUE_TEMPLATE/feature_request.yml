name: Feature request
description: 提出新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: goal
    attributes:
      label: 目标
      description: 这个需求要解决什么问题
      placeholder: 例如：希望在文章解读中支持超长文本分段处理
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 方案建议
      description: 你希望如何实现
      placeholder: 输入 UI、交互、接口或技术建议

  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      description: 如何判断这个功能完成
      placeholder: |
        - [ ] 条件 1
        - [ ] 条件 2
